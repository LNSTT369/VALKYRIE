<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="3000" viewBox="0 0 1280 3000" role="img" aria-label="NIGHTWATCH3R portfolio">
  <rect x="0" y="0" width="1280" height="3000" fill="#0A0A0B"></rect>
  <defs>
    <radialGradient id="lr-primary" cx="1152" cy="21.424" r="921.6" fx="1152" fy="21.424" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.34"></stop>
      <stop offset="18%" stop-color="#F7FAFF" stop-opacity="0.18"></stop>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0.06"></stop>
